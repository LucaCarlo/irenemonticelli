server {
    listen 3017;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # Reverse proxy preserves Host; do not emit absolute redirects
    absolute_redirect off;
    server_name_in_redirect off;
    port_in_redirect off;

    # Real client IP from reverse proxy
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;

    # Root: serve index.html directly (avoid try_files loop on dir)
    location = / {
        try_files /index.html =404;
    }

    # 301 redirect /index.html and /index -> /
    location = /index.html { return 301 /; }
    location = /index { return 301 /; }

    # 301 redirect /<page>.html -> /<page>  (clean URLs)
    location ~ ^/(?<page>[A-Za-z0-9_-]+)\.html$ {
        return 301 /$page;
    }

    # Pretty URLs: /contatti -> /contatti.html
    location / {
        try_files $uri $uri.html =404;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Long cache for static assets
    location /Foto\ sito\ Irene\ Monticelli/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # HTML pages: short cache so changes propagate
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
}
